services:
  ml-service:
    build:
      context: ../ml
      dockerfile: Dockerfile
    container_name: repair-ml-api
    ports:
      - "8000:8000"
    environment:
      - ML_DEBUG=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ../ml/models:/app/ml/models:ro
      - ../ml/datasets:/app/ml/datasets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - repair-network

networks:
  repair-network:
    driver: bridge
