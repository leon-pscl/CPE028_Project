services:
  # ML Model Service
  ml-service:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: repair-ml-api
    ports:
      - "8000:8000"
    environment:
      - ML_DEBUG=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml/models:/app/ml/models:ro
      - ./ml/datasets:/app/ml/datasets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - repair-network

  # Database (if needed)
  postgres:
    image: postgres:15-alpine
    container_name: repair-db
    environment:
      - POSTGRES_DB=repair_db
      - POSTGRES_USER=repair_user
      - POSTGRES_PASSWORD=repair_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - repair-network

  # Frontend (optional)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repair-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - ml-service
    restart: unless-stopped
    networks:
      - repair-network

  # Main Backend API (optional - if you want separate backend service)
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - postgres
  #     - ml-service
  #   environment:
  #     - DB_URL=postgresql://repair_user:repair_password@postgres:5432/repair_db
  #     - ML_SERVICE_URL=http://ml-service:8000
  #   networks:
  #     - repair-network

volumes:
  postgres_data:

networks:
  repair-network:
    driver: bridge
